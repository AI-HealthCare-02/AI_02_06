# Production Docker Compose for t3.micro (1GB RAM)
# Next.js는 Vercel에서 별도 배포, EC2에는 API 서버만 배포

services:
  # 1. PostgreSQL (Database) - 내부 전용
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${DB_USER:-downforce_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-downforce_db}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    # 프로덕션에서는 포트 노출하지 않음 (내부 통신만)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-downforce_admin} -d ${DB_NAME:-downforce_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # 2. Redis (메시지 브로커 및 캐싱) - 내부 전용
  redis:
    image: redis:alpine
    container_name: redis
    networks:
      - backend
    # 프로덕션에서는 포트 노출하지 않음 (내부 통신만)
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 3. API Server (FastAPI)
  fastapi:
    container_name: fastapi
    build:
      context: .
      dockerfile: app/Dockerfile.prod
    env_file:
      - .env
    volumes:
      - static_volume:/app/templates
      - media_volume:/app/media
    restart: unless-stopped
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Phase X: FastAPI 는 ML 추론을 하지 않으므로 경량화.
    # 300M 은 Python 3.13 런타임 + FastAPI + Tortoise ORM + Redis 클라이언트만으로도
    # 피크 시 빠듯했던 사례가 있어 400M 로 소폭 상향.
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 400M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # 4. AI Worker (RAG 임베딩·LLM 추론·OCR)
  ai-worker:
    container_name: ai-worker
    build:
      context: .
      dockerfile: ai_worker/Dockerfile.prod
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - frontend  # 외부 API 접근용 (CLOVA OCR, OpenAI)
      - backend   # Redis 통신용
    healthcheck:
      test: ["CMD", "python", "-c", "import redis; r=redis.from_url('redis://redis:6379/0'); r.ping()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s  # 모델 warmup 감안해 start_period 확대
    depends_on:
      redis:
        condition: service_healthy
    # Phase X: ko-sroberta 모델(420MB) + PyTorch CPU 런타임 + AsyncOpenAI 클라이언트 +
    # ThreadPoolExecutor 버퍼. 피크 시 1.5GB 내외가 안전.
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1500M
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # 5. Nginx (Reverse Proxy) - HTTPS
  nginx:
    container_name: nginx
    image: nginx:alpine
    volumes:
      - ./nginx/prod_https.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
      - static_volume:/vol/web/static
      - media_volume:/vol/web/media
    ports:
      - "80:80"
      - "443:443"
    networks:
      - frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      fastapi:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M
        reservations:
          memory: 32M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  postgres_data:
    name: postgres_data
  static_volume:
    name: static_volume
  media_volume:
    name: media_volume

networks:
  # 외부 접근용 네트워크 (nginx, fastapi)
  frontend:
    name: frontend
    driver: bridge
  # 내부 서비스용 네트워크 (fastapi, redis, ai-worker)
  backend:
    name: backend
    driver: bridge
