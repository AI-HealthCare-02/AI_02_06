services:
  # 1. Redis (메시지 브로커 및 캐싱)
  redis:
    image: redis:alpine
    container_name: redis
    networks:
      - ws
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # 2. API Server (FastAPI) - 외부 AWS DB 연결
  fastapi:
    container_name: fastapi
    image: ${DOCKER_USER}/${DOCKER_REPOSITORY}:app-${APP_VERSION}
    env_file: .env
    volumes:
      - static_volume:/app/templates
      - media_volume:/app/media
    restart: always
    networks:
      - ws
    depends_on:
      redis:
        condition: service_healthy

  # 3. AI Worker (Model 학습 및 추론)
  ai-worker:
    container_name: ai-worker
    image: ${DOCKER_USER}/${DOCKER_REPOSITORY}:ai-${AI_WORKER_VERSION}
    env_file: .env
    restart: always
    mem_limit: 4G
    networks:
      - ws
    depends_on:
      redis:
        condition: service_healthy

  # 4. Frontend (Next.js) - 프로덕션 빌드
  frontend:
    container_name: nextjs-fe
    image: ${DOCKER_USER}/${DOCKER_REPOSITORY}:frontend-${APP_VERSION}
    env_file: .env
    restart: always
    networks:
      - ws

  # 5. Nginx (Reverse Proxy + SSL)
  nginx:
    container_name: nginx
    image: nginx:alpine
    volumes:
      - ./nginx/prod_https.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/vol/web/static
      - media_volume:/vol/web/media
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    ports:
      - "80:80"
      - "443:443"
    networks:
      - ws
    depends_on:
      - fastapi
      - frontend

  # 6. Certbot (SSL 인증서 자동 갱신)
  certbot:
    image: certbot/certbot
    container_name: auto-certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 48h & wait $${!}; done;'"
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    depends_on:
      - nginx

volumes:
  static_volume:
    name: static_volume
  media_volume:
    name: media_volume
  certbot-conf:
    name: certbot-conf
  certbot-www:
    name: certbot-www

networks:
  ws:
    name: ws
    driver: bridge
