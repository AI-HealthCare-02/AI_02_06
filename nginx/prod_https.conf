upstream fastapi {
    server fastapi:8000;
}

# HTTP -> HTTPS 리다이렉트
server {
    listen 80;
    server_name ai-02-06.duckdns.org;

    # certbot 인증서 갱신용
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # API 요청은 HTTPS로 리다이렉트
    location /api/ {
        return 301 https://$host$request_uri;
    }

    # Health check (HTTP)
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name ai-02-06.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/ai-02-06.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ai-02-06.duckdns.org/privkey.pem;

    # SSL 설정 (inline - options-ssl-nginx.conf 대체)
    ssl_session_cache shared:le_nginx_SSL:10m;
    ssl_session_timeout 1440m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384";

    # 파일 업로드 크기 제한
    client_max_body_size 10M;

    # API 요청 -> FastAPI
    location /api/ {
        # CORS 설정 - Vercel 허용
        set $cors_origin "";
        if ($http_origin ~* "^https?://(localhost:3000|.*\.vercel\.app)$") {
            set $cors_origin $http_origin;
        }

        # Preflight (OPTIONS)
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        # 실제 요청 CORS 헤더
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;

        proxy_pass http://fastapi;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;

        # 타임아웃 (AI 처리용)
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;
    }

    # Health check
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    location / {
        return 404;
    }
}
