services:
  # 1. Redis (메시지 브로커 및 캐싱)
  redis:
    image: redis:alpine
    container_name: redis
    networks:
      - ws
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # 2. API Server (FastAPI)
  fastapi:
    container_name: fastapi
    build:
      context: .
      dockerfile: app/Dockerfile
    image: ${DOCKER_USER}/${DOCKER_REPOSITORY}:app-${APP_VERSION}
    env_file: .env
    command: >
      sh -c "uv run --no-sync uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./app:/app/app
      - static_volume:/app/templates
    restart: always
    ports:
      - "8000:8000"
    networks:
      - ws
    depends_on:
      redis:
        condition: service_healthy

  # 3. AI Worker (Model 학습 및 추론)
  ai-worker:
    container_name: ai-worker
    build:
      context: .
      dockerfile: ai_worker/Dockerfile
    image: ${DOCKER_USER}/${DOCKER_REPOSITORY}:ai-${AI_WORKER_VERSION}
    env_file: .env
    restart: always
    mem_limit: 4G
    networks:
      - ws
    depends_on:
      redis:
        condition: service_healthy

  # 4. Frontend (Next.js)
  frontend:
    container_name: nextjs-fe
    build:
      context: ./medication-frontend
      dockerfile: Dockerfile
    env_file: .env
    volumes:
      - ./medication-frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - ws
    restart: always
    ports:
      - "3000:3000"

  # 5. Nginx (Reverse Proxy)
  nginx:
    container_name: nginx
    image: nginx:alpine
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/vol/web/static
    ports:
      - "80:80"
    networks:
      - ws
    depends_on:
      - fastapi
      - frontend

volumes:
  static_volume:

networks:
  ws:
    driver: bridge
