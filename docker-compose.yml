services:
  # 1. Redis (메시지 브로커 및 캐싱)
  redis:
    image: redis:alpine
    container_name: redis
    networks:
      - backend
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    # 리소스 제한
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          memory: 128M
    # 로깅 설정
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 2. API Server (FastAPI)
  fastapi:
    container_name: fastapi
    build:
      context: ./app
      dockerfile: Dockerfile
    image: ${DOCKER_USER}/${DOCKER_REPOSITORY}:app-${APP_VERSION}
    env_file:
      - .env
      - ./app/.env
    command: >
      sh -c "uv run --no-sync uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./app:/app/app
      - static_volume:/app/templates
    ports:
      - "8000:8000"
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      redis:
        condition: service_healthy
    # 리소스 제한
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          memory: 256M
    # 로깅 설정
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # 3. AI Worker (Model 학습 및 추론)
  ai-worker:
    container_name: ai-worker
    build:
      context: ./ai_worker
      dockerfile: Dockerfile
    image: ${DOCKER_USER}/${DOCKER_REPOSITORY}:ai-${AI_WORKER_VERSION}
    env_file:
      - .env
      - ./ai_worker/.env
    networks:
      - frontend  # 외부 API 접근용 (CLOVA OCR, OpenAI)
      - backend   # Redis 통신용
    healthcheck:
      test: ["CMD", "pgrep", "-f", "python"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy
    # 리소스 제한 (AI 작업용 대용량)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          memory: 1G
    # 로깅 설정
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # 4. Frontend (Next.js)
  frontend:
    container_name: nextjs-fe
    build:
      context: ./medication-frontend
      dockerfile: Dockerfile
      target: dev
    env_file:
      - .env
      - ./medication-frontend/.env
    environment:
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./medication-frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - frontend
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # 리소스 제한
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          memory: 256M
    # 로깅 설정
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # 5. Nginx (Reverse Proxy)
  nginx:
    container_name: nginx
    image: nginx:alpine
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/vol/web/static
    ports:
      - "80:80"
    networks:
      - frontend
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      fastapi:
        condition: service_healthy
      frontend:
        condition: service_healthy
    # 리소스 제한
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 64M
    # 로깅 설정
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  static_volume:

networks:
  # 외부 접근용 네트워크 (nginx, fastapi, frontend)
  frontend:
    driver: bridge
  # 내부 서비스용 네트워크 (fastapi, redis, ai-worker)
  backend:
    driver: bridge
    internal: true
