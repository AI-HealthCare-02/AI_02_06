services:
  # 1. PostgreSQL (Database with pgvector)
  postgres:
    image: ankane/pgvector:v0.5.1
    container_name: postgres
    environment:
      POSTGRES_USER: ${DB_USER:-downforce_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-downforce_admin}
      POSTGRES_DB: ${DB_NAME:-downforce_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-downforce_admin} -d ${DB_NAME:-downforce_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # 2. Redis (메시지 브로커 및 캐싱)
  redis:
    image: redis:alpine
    container_name: redis
    networks:
      - backend
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    # 리소스 제한
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          memory: 128M
    # 로깅 설정
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 2. API Server (FastAPI)
  fastapi:
    container_name: fastapi
    build:
      context: .
      dockerfile: app/Dockerfile
    image: ${DOCKER_USER}/${DOCKER_REPOSITORY}:app-${APP_VERSION}
    env_file:
      - .env
    command: >
      sh -c "uv run --no-sync uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./app:/app/app
      - ./ai_worker:/app/ai_worker
      - ./scripts:/app/scripts
      - static_volume:/app/templates
    ports:
      - "8000:8000"
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # 리소스 제한
    # Phase X 이후 FastAPI 는 ML 추론을 하지 않으므로 1G → 512M 로 축소.
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 128M
    # 로깅 설정
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # 3. AI Worker (RAG 임베딩·LLM 추론, OCR)
  ai-worker:
    container_name: ai-worker
    build:
      context: .
      dockerfile: ai_worker/Dockerfile
    image: ${DOCKER_USER}/${DOCKER_REPOSITORY}:ai-${AI_WORKER_VERSION}
    env_file:
      - .env
    # Phase X: 로컬 개발 시 FastAPI 와 코드 공유를 위해 app/scripts 마운트.
    # ai_worker.providers.llm -> ai_worker.utils.rag -> app.core.config 의존 체인을
    # 런타임 import 가능하게 한다.
    volumes:
      - ./app:/app/app
      - ./ai_worker:/app/ai_worker
      - ./scripts:/app/scripts
    networks:
      - frontend  # 외부 API 접근용 (CLOVA OCR, OpenAI)
      - backend   # Redis 통신용
    healthcheck:
      test: ["CMD", "pgrep", "-f", "python"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      redis:
        condition: service_healthy
    # 리소스 제한: ko-sroberta 모델(420MB) + 임베딩 버퍼 + OpenAI async client
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          memory: 1G
    # 로깅 설정
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # 4. Nginx (Reverse Proxy + Static File Server)
  nginx:
    container_name: nginx
    image: nginx:alpine
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./medication-frontend/out:/usr/share/nginx/html:ro  # Static Export 빌드 결과물
      - static_volume:/vol/web/static
    ports:
      - "80:80"
    networks:
      - frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      fastapi:
        condition: service_healthy
    # 리소스 제한
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 64M
    # 로깅 설정
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  postgres_data:
  static_volume:

networks:
  # 외부 접근용 네트워크 (nginx, fastapi)
  frontend:
    driver: bridge
  # 내부 서비스용 네트워크 (fastapi, redis, ai-worker)
  backend:
    driver: bridge
#    internal: true
