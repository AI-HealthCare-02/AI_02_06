# 로컬 개발용 Docker Compose.
# 보안: 로컬에선 postgres/redis 포트를 호스트에 노출해 DBeaver / redis-cli 로 접근 가능.
# 프로드는 docker-compose.prod.yml 에서 내부 전용으로 격리.

services:
  # PostgreSQL + pgvector — RAG 벡터 저장소
  # 공식 pgvector image (PG15 + pgvector 0.7+). ankane/pgvector 는 archived 라 마이그레이션함.
  postgres:
    image: pgvector/pgvector:pg15
    container_name: postgres
    environment:
      POSTGRES_USER: ${DB_USER:-downforce_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-downforce_admin}
      POSTGRES_DB: ${DB_NAME:-downforce_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-downforce_admin} -d ${DB_NAME:-downforce_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # Redis — RQ 큐 + PendingTurn + 캐시
  redis:
    image: redis:alpine
    container_name: redis
    # 60 초마다 서버측 TCP keepalive PING — Docker bridge / WSL2 NAT 의 idle TCP
    # 세션 강제 종료(Idle Connection Drop) 1차 예방. 클라이언트(redis-py) 의
    # ``socket_keepalive`` + ``health_check_interval`` 와 양방향 보호.
    command: ["redis-server", "--tcp-keepalive", "60"]
    networks:
      - backend
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # FastAPI API 서버 — ML 추론은 ai-worker 에 위임, bind mount 로 hot-reload
  fastapi:
    container_name: fastapi
    build:
      context: .
      dockerfile: app/Dockerfile
    image: ${DOCKER_USER}/${DOCKER_REPOSITORY}:app-${APP_VERSION}
    env_file:
      - .env
    command: >
      sh -c "uv run --no-sync uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./app:/app/app
      - ./ai_worker:/app/ai_worker
      - ./scripts:/app/scripts
      - static_volume:/app/templates
    ports:
      - "8000:8000"
    networks:
      - frontend  # nginx 연결 + 외부 OAuth 호출
      - backend   # DB / Redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # AI Worker — ko-sroberta + OpenAI + OCR
  # app/ 바인드: ai_worker.utils.rag → app.dtos.rag 의존
  ai-worker:
    container_name: ai-worker
    build:
      context: .
      dockerfile: ai_worker/Dockerfile
    image: ${DOCKER_USER}/${DOCKER_REPOSITORY}:ai-${AI_WORKER_VERSION}
    env_file:
      - .env
    volumes:
      - ./app:/app/app
      - ./ai_worker:/app/ai_worker
      - ./scripts:/app/scripts
    networks:
      - frontend  # OpenAI / Kakao Local / CLOVA OCR 외부 호출
      - backend   # Redis
    healthcheck:
      test: ["CMD", "pgrep", "-f", "python"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # Nginx — 정적 FE + FastAPI 리버스 프록시
  nginx:
    container_name: nginx
    image: nginx:alpine
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./medication-frontend/out:/usr/share/nginx/html:ro
      - static_volume:/vol/web/static
    ports:
      - "80:80"
    networks:
      - frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      fastapi:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  postgres_data:
  static_volume:

networks:
  # 외부 통신 가능 — 외부 HTTP 인바운드(nginx) + 외부 API 아웃바운드(fastapi/ai-worker)
  frontend:
    driver: bridge
  # 컨테이너 간 통신 전용. 로컬에선 postgres/redis 디버깅 편의상 internal=false.
  # 프로드는 internal: true 로 인터넷 차단.
  backend:
    driver: bridge
