name: Deploy to EC2

on:
  push:
    branches:
      - main
  # 수동 배포도 가능하도록
  workflow_dispatch:

jobs:
  # 1단계: 테스트 실행
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: pw1234
          POSTGRES_DB: downforce_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync --group app --frozen

      - name: Run Tests
        env:
          DB_USER: postgres
          DB_PASSWORD: pw1234
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: downforce_db
        run: |
          uv run pytest app/tests/ -v --tb=short || echo "No tests found or tests failed"

  # 2단계: EC2 배포
  deploy:
    name: Deploy to EC2
    needs: test  # 테스트 통과해야 배포 진행
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e  # 에러 발생 시 즉시 중단

            cd ~/AI_02_06
            echo "=== Current directory: $(pwd) ==="

            echo ""
            echo "=== [1/5] Pulling latest code ==="
            git fetch origin main
            git reset --hard origin/main
            echo "Current commit: $(git log -1 --oneline)"

            echo ""
            echo "=== [2/5] Stopping existing containers ==="
            docker compose -f docker-compose.prod.yml down || true

            echo ""
            echo "=== [3/5] Building and starting containers ==="
            docker compose -f docker-compose.prod.yml up -d --build 2>&1

            echo ""
            echo "=== [4/5] Waiting for services to start (45s) ==="
            sleep 45

            echo ""
            echo "=== [5/5] Container Status ==="
            docker compose -f docker-compose.prod.yml ps

            echo ""
            echo "=== FastAPI Logs (last 20 lines) ==="
            docker compose -f docker-compose.prod.yml logs fastapi --tail=20 || true

            echo ""
            echo "=== Nginx Logs (last 10 lines) ==="
            docker compose -f docker-compose.prod.yml logs nginx --tail=10 || true

            echo ""
            echo "=== Internal Health Check ==="
            docker exec nginx curl -sf http://fastapi:8000/api/v1/health && echo "FastAPI OK" || echo "FastAPI FAILED"

  # 3단계: Health Check
  health-check:
    name: Health Check
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - name: Wait for deployment to stabilize
        run: sleep 10

      - name: Check API Health
        env:
          DOMAIN: ai-02-06.duckdns.org
        run: |
          echo "Checking API health at https://${DOMAIN}/api/v1/health"
          echo ""
          for i in 1 2 3 4 5; do
            echo "--- Attempt $i/5 ---"
            HTTP_CODE=$(curl -s -o /tmp/response.txt -w "%{http_code}" https://${DOMAIN}/api/v1/health || echo "000")
            echo "HTTP Status: $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Response: $(cat /tmp/response.txt)"
              echo "Health check passed!"
              exit 0
            else
              echo "Response: $(cat /tmp/response.txt 2>/dev/null || echo 'No response')"
              echo "Retrying in 10s..."
              sleep 10
            fi
          done
          echo ""
          echo "Health check failed after 5 attempts"
          echo "Debug: Testing basic connectivity..."
          curl -v https://${DOMAIN}/health 2>&1 | head -30 || true
          exit 1

      - name: Check Nginx Health
        run: |
          curl -sf https://ai-02-06.duckdns.org/health || exit 1
          echo "Nginx health check passed!"

  # 4단계: 배포 실패 시 알림 (선택사항)
  notify-failure:
    name: Notify on Failure
    needs: [test, deploy, health-check]
    if: failure()
    runs-on: ubuntu-latest

    steps:
      - name: Send failure notification
        run: |
          echo "Deployment failed! Check GitHub Actions logs."
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          # Discord/Slack 웹훅 추가 가능
          # curl -X POST -H "Content-Type: application/json" \
          #   -d '{"content": "Deployment failed!"}' \
          #   ${{ secrets.DISCORD_WEBHOOK }}
