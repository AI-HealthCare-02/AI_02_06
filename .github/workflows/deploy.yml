name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: pw1234
          POSTGRES_DB: downforce_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync --group app --frozen

      - name: Run Tests
        env:
          DB_USER: postgres
          DB_PASSWORD: pw1234
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: downforce_db
        run: |
          uv run pytest app/tests/ -v --tb=short || echo "No tests found or tests failed"

  deploy:
    name: Deploy to EC2
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          # 빌드 합계가 10분 초과 (ai-worker ~6m + fastapi ~4m + migration + health) — 여유 30m
          command_timeout: "30m"
          script: |
            set -e
            cd ~/AI_02_06

            echo "=== [1/5] Pull latest code ==="
            git fetch origin main
            git reset --hard origin/main
            echo "Commit: $(git log -1 --oneline)"

            echo "=== [2/6] Stop containers ==="
            docker compose -f docker-compose.prod.yml down || true

            echo "=== [2.5/6] Prune build cache + dangling images (디스크 풀 재발 방지) ==="
            # 이번 통합으로 ai-worker / fastapi 가 torch + sentence-transformers 등 무거운 의존성을
            # 갖게 되어 layer 누적이 빠름. EC2 root 29GB 한도 안에서 돌아가려면 매 deploy 직전에
            # 캐시·dangling image 를 비워야 함. running 컨테이너 / named volume 은 -a 가 보호.
            docker builder prune -af || true
            docker image prune -af || true

            echo "=== [3/6] Build and start ==="
            docker compose -f docker-compose.prod.yml up -d --build

            echo "=== [4/6] Wait for DB ready ==="
            sleep 30

            echo "=== [5/6] Run migrations ==="
            # Check if there are pending migrations and apply them
            docker compose -f docker-compose.prod.yml exec -T fastapi aerich upgrade || {
              echo "Migration failed, checking status..."
              docker compose -f docker-compose.prod.yml exec -T fastapi aerich status
              exit 1
            }
            echo "Migrations completed successfully"

            echo "=== [6/6] Status ==="
            docker compose -f docker-compose.prod.yml ps
            echo "--- FastAPI Logs ---"
            docker compose -f docker-compose.prod.yml logs fastapi --tail=15 || true
            echo "--- Health Check ---"
            docker exec nginx curl -sf http://fastapi:8000/api/v1/health && echo " OK" || echo " FAILED"

  health-check:
    name: Health Check
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - name: Wait for deployment to stabilize
        run: sleep 10

      - name: Check API Health
        env:
          DOMAIN: ai-02-06.duckdns.org
        run: |
          echo "Checking https://${DOMAIN}/api/v1/health"
          for i in 1 2 3 4 5; do
            HTTP_CODE=$(curl -s -o /tmp/resp.txt -w "%{http_code}" https://${DOMAIN}/api/v1/health || echo "000")
            echo "Attempt $i: HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ]; then
              cat /tmp/resp.txt && echo ""
              exit 0
            fi
            sleep 10
          done
          echo "Failed after 5 attempts"
          exit 1

      - name: Check Nginx Health
        run: curl -sf https://ai-02-06.duckdns.org/health && echo "Nginx OK"

  notify-failure:
    name: Notify Failure
    needs: [test, deploy, health-check]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Log failure
        run: |
          echo "Deploy failed: ${{ github.repository }}@${{ github.sha }}"
