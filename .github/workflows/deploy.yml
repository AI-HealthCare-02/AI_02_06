name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: pw1234
          POSTGRES_DB: downforce_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync --group app --frozen

      - name: Run Tests
        env:
          DB_USER: postgres
          DB_PASSWORD: pw1234
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: downforce_db
        run: |
          uv run pytest app/tests/ -v --tb=short || echo "No tests found or tests failed"

  # ── 이미지 빌드 + ghcr.io 푸시 ──────────────────────────────────────────
  # 흐름: GitHub Actions runner (4 vCPU) 에서 buildx 로 빌드 -> ghcr.io push
  # EC2 는 pull 만 하므로 6~10분 build 시간이 GHA runner 로 이전 + cache 활용
  build-and-push:
    name: Build & Push to ghcr.io
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # ghcr.io 쓰기 — organization default 가 read-only 라 job 단위 명시 필수

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push fastapi
        uses: docker/build-push-action@v5
        with:
          context: .
          file: app/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/ai-healthcare-02/ai_02_06-fastapi:latest
            ghcr.io/ai-healthcare-02/ai_02_06-fastapi:${{ github.sha }}
          cache-from: type=gha,scope=fastapi
          cache-to: type=gha,scope=fastapi,mode=max

      - name: Build & push ai-worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ai_worker/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/ai-healthcare-02/ai_02_06-ai-worker:latest
            ghcr.io/ai-healthcare-02/ai_02_06-ai-worker:${{ github.sha }}
          cache-from: type=gha,scope=ai-worker
          cache-to: type=gha,scope=ai-worker,mode=max

  deploy:
    name: Deploy to EC2
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          # build 가 GHA 에서 끝났으므로 EC2 작업은 pull + up + migrate 중심 — 여유 15m
          command_timeout: "15m"
          script: |
            set -e
            cd ~/AI_02_06

            echo "=== [1/7] Pull latest code ==="
            git fetch origin main
            git reset --hard origin/main
            echo "Commit: $(git log -1 --oneline)"

            echo "=== [2/7] Rotate logs (한 세대 백업 + 새 라이프사이클) ==="
            # 직전 빌드 logs 는 logs.prev/ 로 한 세대 보존 (사후 분석).
            # 그 이전 prev 는 삭제 — 항상 두 세대 (현재 + prev) 만 유지.
            # 새 빌드 시작 시점에 logs/ 가 비워져 다음 컨테이너 up 직후부터
            # 깨끗한 상태로 RotatingFileHandler 가 기록을 시작한다.
            sudo rm -rf ~/AI_02_06/logs.prev
            if [ -d ~/AI_02_06/logs ]; then
              sudo mv ~/AI_02_06/logs ~/AI_02_06/logs.prev
            fi
            mkdir -p ~/AI_02_06/logs/fastapi ~/AI_02_06/logs/ai-worker

            echo "=== [3/7] Pull pre-built images from ghcr.io ==="
            docker compose -f docker-compose.prod.yml pull fastapi ai-worker

            echo "=== [4/7] Prune unused docker resources (디스크 회복 강화) ==="
            # docker system prune -af --volumes:
            #   - 미사용 image (dangling + 옛 ghcr.io tag) 제거
            #   - 정지된 컨테이너 + 그에 묶인 anonymous volume 제거
            #   - 미사용 network + builder cache 제거
            # named volume (postgres / redis 데이터) 은 보존 — running 또는 referenced 라 안전.
            # ai-worker 가 압축 1GB / 해제 ~3GB 라 매 deploy 마다 정리 필수.
            docker system prune -af --volumes || true

            echo "=== [5/7] Stop + Start (no build) ==="
            docker compose -f docker-compose.prod.yml down || true
            docker compose -f docker-compose.prod.yml up -d --no-build

            echo "=== [5.5/7] Wait for DB ready ==="
            sleep 30

            echo "=== [6/7] Run migrations ==="
            docker compose -f docker-compose.prod.yml exec -T fastapi aerich upgrade || {
              echo "Migration failed, checking status..."
              docker compose -f docker-compose.prod.yml exec -T fastapi aerich status
              exit 1
            }
            echo "Migrations completed successfully"

            echo "=== [7/7] Status ==="
            docker compose -f docker-compose.prod.yml ps
            echo "--- FastAPI Logs ---"
            docker compose -f docker-compose.prod.yml logs fastapi --tail=15 || true
            echo "--- Health Check ---"
            docker exec nginx curl -sf http://fastapi:8000/api/v1/health && echo " OK" || echo " FAILED"

  health-check:
    name: Health Check
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - name: Wait for deployment to stabilize
        run: sleep 10

      - name: Check API Health
        env:
          DOMAIN: ai-02-06.duckdns.org
        run: |
          echo "Checking https://${DOMAIN}/api/v1/health"
          for i in 1 2 3 4 5; do
            HTTP_CODE=$(curl -s -o /tmp/resp.txt -w "%{http_code}" https://${DOMAIN}/api/v1/health || echo "000")
            echo "Attempt $i: HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ]; then
              cat /tmp/resp.txt && echo ""
              exit 0
            fi
            sleep 10
          done
          echo "Failed after 5 attempts"
          exit 1

      - name: Check Nginx Health
        run: curl -sf https://ai-02-06.duckdns.org/health && echo "Nginx OK"

  notify-failure:
    name: Notify Failure
    needs: [test, build-and-push, deploy, health-check]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Log failure
        run: |
          echo "Deploy failed: ${{ github.repository }}@${{ github.sha }}"
