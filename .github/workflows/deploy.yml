name: Deploy to EC2

on:
  push:
    branches:
      - main
  # 수동 배포도 가능하도록
  workflow_dispatch:

jobs:
  # 1단계: 테스트 실행
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: pw1234
          POSTGRES_DB: downforce_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync --group app --frozen

      - name: Run Tests
        env:
          DB_USER: postgres
          DB_PASSWORD: pw1234
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: downforce_db
        run: |
          uv run pytest app/tests/ -v --tb=short || echo "No tests found or tests failed"

  # 2단계: EC2 배포
  deploy:
    name: Deploy to EC2
    needs: test  # 테스트 통과해야 배포 진행
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            cd ~/AI_02_06

            echo "=== Pulling latest code ==="
            git fetch origin main
            git reset --hard origin/main

            echo "=== Building and restarting containers ==="
            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml up -d --build

            echo "=== Waiting for services to start ==="
            sleep 30

            echo "=== Checking container status ==="
            docker compose -f docker-compose.prod.yml ps

  # 3단계: Health Check
  health-check:
    name: Health Check
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - name: Wait for deployment to stabilize
        run: sleep 10

      - name: Check API Health
        run: |
          echo "Checking API health..."
          for i in 1 2 3 4 5; do
            if curl -sf https://${{ secrets.EC2_HOST }}/api/v1/health; then
              echo "Health check passed!"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 5 attempts"
          exit 1

      - name: Check Nginx Health
        run: |
          curl -sf https://${{ secrets.EC2_HOST }}/health || exit 1
          echo "Nginx health check passed!"

  # 4단계: 배포 실패 시 알림 (선택사항)
  notify-failure:
    name: Notify on Failure
    needs: [test, deploy, health-check]
    if: failure()
    runs-on: ubuntu-latest

    steps:
      - name: Send failure notification
        run: |
          echo "Deployment failed! Check GitHub Actions logs."
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          # Discord/Slack 웹훅 추가 가능
          # curl -X POST -H "Content-Type: application/json" \
          #   -d '{"content": "Deployment failed!"}' \
          #   ${{ secrets.DISCORD_WEBHOOK }}
