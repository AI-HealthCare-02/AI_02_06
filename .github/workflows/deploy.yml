name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: pw1234
          POSTGRES_DB: downforce_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync --group app --frozen

      - name: Run Tests
        env:
          DB_USER: postgres
          DB_PASSWORD: pw1234
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: downforce_db
        run: |
          uv run pytest app/tests/ -v --tb=short || echo "No tests found or tests failed"

  # ── 이미지 빌드 + ghcr.io 푸시 ──────────────────────────────────────────
  # 흐름: GitHub Actions runner (4 vCPU) 에서 buildx 로 빌드 -> ghcr.io push
  # EC2 는 pull 만 하므로 6~10분 build 시간이 GHA runner 로 이전 + cache 활용
  build-and-push:
    name: Build & Push to ghcr.io
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # ghcr.io 쓰기 — organization default 가 read-only 라 job 단위 명시 필수

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push fastapi
        uses: docker/build-push-action@v5
        with:
          context: .
          file: app/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/ai-healthcare-02/ai_02_06-fastapi:latest
            ghcr.io/ai-healthcare-02/ai_02_06-fastapi:${{ github.sha }}
          cache-from: type=gha,scope=fastapi
          cache-to: type=gha,scope=fastapi,mode=max

      - name: Build & push ai-worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ai_worker/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/ai-healthcare-02/ai_02_06-ai-worker:latest
            ghcr.io/ai-healthcare-02/ai_02_06-ai-worker:${{ github.sha }}
          cache-from: type=gha,scope=ai-worker
          cache-to: type=gha,scope=ai-worker,mode=max

  deploy:
    name: Deploy to EC2
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          # build 가 GHA 에서 끝났으므로 EC2 작업은 pull + up + migrate 중심 — 여유 15m
          command_timeout: "15m"
          script: |
            set -e
            cd ~/AI_02_06

            echo "=== [1/7] Pull latest code ==="
            git fetch origin main
            git reset --hard origin/main
            echo "Commit: $(git log -1 --oneline)"

            echo "=== [2/8] Rotate logs (압축 + 한 세대 보존) ==="
            # 정책 (사용자 합의 2026-05-01):
            # - deploy 시: 현재 logs/ → logs.prev.tar.gz 로 gzip 압축, 한 세대만
            #   보존. 그 이전 archive 는 삭제. 새 logs/ 는 빈 상태로 시작 →
            #   컨테이너 up 후 TimedRotatingFileHandler 가 새 라이프사이클.
            # - 평상시 회전 (deploy 미발생 구간): Python TimedRotatingFileHandler
            #   가 3시간마다 회전 + 백업 2개 유지 = 활성 1 + 백업 2 = 3개 파일.
            #   가장 오래된 백업은 9시간 시점에 자동 삭제. cron 의존 없음.
            # - JSON 텍스트 로그는 gzip 90% 이상 압축 → archive 약 12MB 수준.
            sudo rm -f ~/AI_02_06/logs.prev.tar.gz
            # 옛 정책 잔재 정리 — logs.prev/ 디렉터리 / logs.archive/ (cron 실험)
            sudo rm -rf ~/AI_02_06/logs.prev ~/AI_02_06/logs.archive
            if [ -d ~/AI_02_06/logs ]; then
              sudo tar -C ~/AI_02_06 -czf ~/AI_02_06/logs.prev.tar.gz logs \
                && sudo rm -rf ~/AI_02_06/logs \
                || echo "WARN: logs archive failed — keeping logs/ as-is for safety"
            fi
            mkdir -p ~/AI_02_06/logs/fastapi ~/AI_02_06/logs/ai-worker
            ls -lah ~/AI_02_06/logs.prev.tar.gz 2>/dev/null || echo "No previous archive (first deploy)"

            echo "=== [3/8] Pre-pull prune (옛 ghcr tag 누적 영구 차단) ==="
            # 2026-05-01 EC2 사고 회귀 가드 — 그날 9개 이미지 20.45GB 누적으로
            # 디스크 90% 도달 후 pull layer extract ENOSPC 로 실패. 원인은
            # 기존 [Pull -> Prune] 순서가, pull 실패 시 prune 단계까지 도달
            # 못해 옛 ghcr tag 이미지가 영구 누적된 것.
            #
            # 정책 — *임계 무관하게 매 배포마다* pull 전에 prune:
            #   - 옛 ghcr tag (직전 배포의 fastapi/ai-worker) 가 untag 상태가
            #     되어 사실상 항상 회수 가능
            #   - ai-worker 한 세대만 ~3GB 해제이므로 누적 안 되는 게 핵심
            #   - prune 자체는 회수할 게 없으면 수 초로 끝나 정상 운영에 부담 X
            # named volume (postgres/redis 데이터) 은 보존 — running/referenced.
            df -h /
            BEFORE_USED=$(df --output=pcent / | tail -1 | tr -dc '0-9')
            echo "Root disk used (before prune): ${BEFORE_USED}%"
            docker image ls --format 'table {{.Repository}}:{{.Tag}}\t{{.Size}}' | head -20
            docker system prune -af --volumes || true
            # builder cache 는 system prune 으로도 빠지나, BuildKit 사용 시 별도
            # 캐시 store 가 남는 경우가 있어 명시 정리.
            docker builder prune -af || true
            AFTER_USED=$(df --output=pcent / | tail -1 | tr -dc '0-9')
            echo "Root disk used (after prune):  ${AFTER_USED}%"

            echo "=== [4/8] Pull pre-built images from ghcr.io ==="
            docker compose -f docker-compose.prod.yml pull fastapi ai-worker

            echo "=== [5/8] Post-pull prune (pull 직후 dangling 정리) ==="
            # pull 직후 동일 repo 의 옛 tag 가 dangling 으로 남는 경우의 마지막 정리.
            # 위 [3/8] 가 이미 비웠으므로 보통 no-op 이지만 안전망으로 한 번 더.
            docker system prune -af --volumes || true
            df -h /

            echo "=== [6/8] Stop + Start (no build) ==="
            docker compose -f docker-compose.prod.yml down || true
            docker compose -f docker-compose.prod.yml up -d --no-build

            echo "=== [6.5/8] Wait for DB ready ==="
            sleep 30

            echo "=== [7/8] Run migrations ==="
            docker compose -f docker-compose.prod.yml exec -T fastapi aerich upgrade || {
              echo "Migration failed, checking status..."
              docker compose -f docker-compose.prod.yml exec -T fastapi aerich status
              exit 1
            }
            echo "Migrations completed successfully"

            echo "=== [8/8] Status ==="
            docker compose -f docker-compose.prod.yml ps
            echo "--- FastAPI Logs ---"
            docker compose -f docker-compose.prod.yml logs fastapi --tail=15 || true
            echo "--- Health Check ---"
            docker exec nginx curl -sf http://fastapi:8000/api/v1/health && echo " OK" || echo " FAILED"

  health-check:
    name: Health Check
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - name: Wait for deployment to stabilize
        run: sleep 10

      - name: Check API Health
        env:
          DOMAIN: ai-02-06.duckdns.org
        run: |
          echo "Checking https://${DOMAIN}/api/v1/health"
          for i in 1 2 3 4 5; do
            HTTP_CODE=$(curl -s -o /tmp/resp.txt -w "%{http_code}" https://${DOMAIN}/api/v1/health || echo "000")
            echo "Attempt $i: HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ]; then
              cat /tmp/resp.txt && echo ""
              exit 0
            fi
            sleep 10
          done
          echo "Failed after 5 attempts"
          exit 1

      - name: Check Nginx Health
        run: curl -sf https://ai-02-06.duckdns.org/health && echo "Nginx OK"

  notify-failure:
    name: Notify Failure
    needs: [test, build-and-push, deploy, health-check]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Log failure
        run: |
          echo "Deploy failed: ${{ github.repository }}@${{ github.sha }}"
